  # Workflow definitions (under companies)
  /companies/{companyId}/workflows:
    get:
      summary: List workflows
      description: List workflows the user has permission to execute (public, or user/group permission). Optional filter by category.
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
            nullable: true
          description: Filter by workflow category ID (empty string or "null" for uncategorized)
      responses:
        200:
          description: List of workflows
    post:
      summary: Create workflow
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        201:
          description: Workflow created
  /companies/{companyId}/workflows/{workflowId}/start:
    post:
      summary: Start workflow execution from UI
      description: Start a new execution for this workflow. Only is_active is checked (not api_enabled). JWT required.
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Execution started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  execution_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: started
        400:
          description: Missing company ID or workflow ID
        401:
          description: Unauthorized
        403:
          description: Workflow is not active
        404:
          description: Workflow not found or access denied
        500:
          description: Internal error

  /companies/{companyId}/workflows/{workflowId}:
    get:
      summary: Get workflow
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Workflow details
    patch:
      summary: Update workflow
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
