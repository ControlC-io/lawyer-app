openapi: 3.0.0
info:
  title: Floowly API
  version: 1.0.0
  description: API documentation for the Floowly backend services.

servers:
  - url: /api
    description: Main API

paths:
  # Auth Endpoints
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                full_name:
                  type: string
      responses:
        201:
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        400:
          description: User already exists
        403:
          description: Public signup is disabled (ENABLE_PUBLIC_SIGNUP is not set to "true")

  /auth/login:
    post:
      summary: Login a user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        401:
          description: Invalid credentials

  /auth/change-password:
    post:
      summary: Change password
      tags: [Auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
      responses:
        200:
          description: Password changed successfully
        401:
          description: Unauthorized or current password invalid

  # Public Endpoints
  /public/config:
    get:
      summary: Get public config (no auth)
      description: Returns client-side config such as whether public signup is enabled. Used by the Auth page.
      tags: [Public]
      responses:
        200:
          description: Public config
          content:
            application/json:
              schema:
                type: object
                required: [signupEnabled]
                properties:
                  signupEnabled:
                    type: boolean
                    description: Whether new users can create an account without an invitation

  /public/feedback:
    post:
      summary: Send feedback
      tags: [Public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userEmail, feedback]
              properties:
                userEmail:
                  type: string
                  format: email
                userName:
                  type: string
                feedback:
                  type: string
      responses:
        200:
          description: Feedback received
        500:
          description: Internal error

  /public/demo-request:
    post:
      summary: Request a demo
      tags: [Public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firstName, lastName, email, companyName]
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                companyName:
                  type: string
      responses:
        200:
          description: Demo request received
        500:
          description: Internal error

  # External Endpoints
  /external/steps/{token}:
    get:
      summary: Get step config by token
      description: Get step config and workflow data_structure by external token (no auth).
      tags: [External]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Step config and workflow data retrieved
        404:
          description: Invalid or expired token

  /external/steps/{token}/submit:
    post:
      summary: Submit external step
      description: Submit data for a step via an external token (no authentication required).
      tags: [External]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
      responses:
        200:
          description: Step submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  triggered_steps:
                    type: array
                    items:
                      type: object
                  validation:
                    type: object
                    properties:
                      is_valid:
                        type: boolean
                      validation_comment:
                        type: string
        404:
          description: Invalid or expired token

  /external/steps/{stepId}/send-link:
    post:
      summary: Send external form link
      description: Send a link to an external form via email.
      tags: [External]
      security:
        - BearerAuth: []
      parameters:
        - name: stepId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token, executionId, companyId]
              properties:
                email:
                  type: string
                  format: email
                token:
                  type: string
                executionId:
                  type: string
                  format: uuid
                companyId:
                  type: string
                  format: uuid
                stepName:
                  type: string
                comment:
                  type: string
      responses:
        200:
          description: Link sent successfully
        401:
          description: Unauthorized

  # Workflow Endpoints
  /workflows/{workflowId}/trigger:
    post:
      summary: Trigger a workflow execution
      tags: [Workflows]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: Initial data for the workflow execution
      responses:
        200:
          description: Workflow triggered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  execution_id:
                    type: string
                    format: uuid
                  status:
                    type: string
        401:
          description: Missing company authorization
        403:
          description: This workflow does not allow API triggers (api_enabled is false)
        404:
          description: Workflow not found

  /workflows/executions/{executionId}:
    get:
      summary: Get execution data
      description: Retrieve all data and steps for a specific execution. JWT required.
      tags: [Workflows]
      security:
        - BearerAuth: []
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Execution data retrieved
        404:
          description: Execution not found

  /workflows/executions/{executionId}/data:
    put:
      summary: Update execution data
      tags: [Workflows]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: Map of field names to values to update
      responses:
        200:
          description: Data updated successfully
        400:
          description: Field names do not match structure

  /workflows/executions/{executionId}/name:
    patch:
      summary: Rename an execution
      tags: [Workflows]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        200:
          description: Execution renamed successfully

  /workflows/executions/{executionId}/logs:
    post:
      summary: Add a log entry
      tags: [Workflows]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [log_text]
              properties:
                log_text:
                  type: string
                step_id:
                  type: string
                  format: uuid
                log_type:
                  type: string
      responses:
        200:
          description: Log entry added successfully

  /workflows/executions/{executionId}/steps/{stepId}:
    patch:
      summary: Update execution step
      description: Update an execution step (e.g. reassign).
      tags: [Workflows]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: stepId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                assignee_id:
                  type: string
                  format: uuid
      responses:
        200:
          description: Step updated successfully
        404:
          description: Execution or step not found

  /workflows/executions/{executionId}/steps/{stepId}/process:
    post:
      summary: Process an automatic step
      description: Manually trigger the processing of an automatic or agent step.
      tags: [Workflows]
      security:
        - ApiKeyAuth: []
        - InternalApiKey: []
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: stepId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Step processing completed

  /workflows/executions/{executionId}/steps/{stepId}/complete:
    post:
      summary: Complete a step
      description: Mark a step as completed and advance the workflow.
      tags: [Workflows]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: stepId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                step_data:
                  type: object
      responses:
        200:
          description: Step completed and workflow advanced

  /workflows/executions/{executionId}/steps/{stepId}/decision:
    post:
      summary: Make a decision
      description: Record a decision for a decision node and advance the workflow.
      tags: [Workflows]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: stepId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision_choice]
              properties:
                decision_choice:
                  type: string
                decision_reason:
                  type: string
                decision_comment:
                  type: string
      responses:
        200:
          description: Decision recorded

  # File Endpoints
  /files/documents/upload:
    post:
      summary: Upload a document
      description: Upload a file to the documents bucket (multipart). JWT required.
      tags: [Files]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                path:
                  type: string
                  description: Path within the bucket
      responses:
        200:
          description: Document uploaded successfully
        401:
          description: Unauthorized

  /files/workflows/executions/{executionId}/files:
    post:
      summary: Upload a file for an execution
      tags: [Files]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [field_name]
              properties:
                field_name:
                  type: string
                file_url:
                  type: string
                  format: uri
                file_base64:
                  type: string
                file_name:
                  type: string
                mime_type:
                  type: string
      responses:
        200:
          description: File uploaded successfully

  /files/upload:
    post:
      summary: Upload an external file
      description: Upload a file using a multi-part form and an external token.
      tags: [Files]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, token]
              properties:
                file:
                  type: string
                  format: binary
                token:
                  type: string
      responses:
        200:
          description: File uploaded successfully

  /files/signed-url:
    post:
      summary: Get a signed URL
      tags: [Files]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bucket, path]
              properties:
                bucket:
                  type: string
                path:
                  type: string
                expiresIn:
                  type: integer
                  description: Expiration time in seconds
      responses:
        200:
          description: Signed URL retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  signedUrl:
                    type: string

  /files/workflows/executions/{executionId}/steps/{stepId}/process-file:
    post:
      summary: Process a file step
      tags: [Files]
      security:
        - ApiKeyAuth: []
        - InternalApiKey: []
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: stepId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workflow_step_id]
              properties:
                workflow_step_id:
                  type: string
                  format: uuid
      responses:
        200:
          description: File step processed
        400:
          description: Missing workflow_step_id or invalid config (e.g. source file not configured)
        404:
          description: Workflow step, execution, or execution step not found

  # User / Me Endpoints
  /me:
    get:
      summary: Get current user profile
      description: Get current user, companies, and super_admin flag. JWT required.
      tags: [Users]
      security:
        - BearerAuth: []
      responses:
        200:
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  companies:
                    type: array
                    items:
                      type: object
                  super_admin:
                    type: boolean
        401:
          description: Unauthorized
    patch:
      summary: Update current user profile
      description: Update full_name, notifications_enabled. JWT required.
      tags: [Users]
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                notifications_enabled:
                  type: boolean
      responses:
        200:
          description: Profile updated
        401:
          description: Unauthorized

  # Invitations
  /invitations/check-email:
    get:
      summary: Check if email exists
      description: For sign up vs sign in on accept page. No auth.
      tags: [Users]
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        200:
          description: Check result (e.g. exists boolean)

  /invitations/{token}:
    get:
      summary: Get invitation by token
      description: Get invitation details for accept page. No auth.
      tags: [Users]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Invitation details
        404:
          description: Invalid or expired token

  /invitations/{token}/accept:
    post:
      summary: Accept an invitation
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Invitation accepted

  /invitations/{id}:
    delete:
      summary: Cancel an invitation
      description: Cancel a pending invitation. JWT, company admin.
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Invitation cancelled
        401:
          description: Unauthorized
        403:
          description: Not company admin

  # Companies
  /companies:
    get:
      summary: List companies
      description: List user's companies (or all if super_admin). JWT required.
      tags: [Companies]
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of companies

  /companies/{companyId}:
    get:
      summary: Get company
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Company details
        404:
          description: Company not found
    patch:
      summary: Update company
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        200:
          description: Company updated

  /companies/{companyId}/executions:
    get:
      summary: List executions
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: List of executions
  /companies/{companyId}/execution-steps:
    get:
      summary: List execution steps
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: List of execution steps
  /companies/{companyId}/executions/{executionId}:
    delete:
      summary: Delete execution
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: executionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Execution deleted

  /companies/{companyId}/users:
    get:
      summary: List company users
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: List of company users
  /companies/{companyId}/users/{userId}:
    delete:
      summary: Remove user from company
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: User removed

  /companies/{companyId}/invitations:
    get:
      summary: List company invitations
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: List of invitations
    post:
      summary: Invite a user to a company
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  description: Role to assign (e.g. company_admin, user)
      responses:
        200:
          description: Invitation sent

  /companies/{companyId}/workflow-categories:
    get:
      summary: List workflow categories
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: List of workflow categories
    post:
      summary: Create workflow category
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        201:
          description: Category created
  /companies/{companyId}/workflow-categories/{categoryId}:
    patch:
      summary: Update workflow category
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        200:
          description: Category updated
    delete:
      summary: Delete workflow category
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Category deleted

  /companies/{companyId}/groups:
    get:
      summary: List groups
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: List of groups
    post:
      summary: Create group
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        201:
          description: Group created
  /companies/{companyId}/groups/{groupId}:
    patch:
      summary: Update group
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Group updated
    delete:
      summary: Delete group
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Group deleted
  /companies/{companyId}/my-group-ids:
    get:
      summary: Get current user group IDs
      tags: [Companies]
      security:
        - BearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
