server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # .mjs not in nginx default mime.types — must be declared before the generic js/css block
    location ~* \.mjs$ {
        types { application/javascript mjs; }
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets aggressively — Vite adds content hashes to filenames
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes → SPA entry point (React Router handles routing client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
