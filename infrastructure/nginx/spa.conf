server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # .mjs is not in nginx's default mime.types — browsers reject it as a module script without this
    types {
        include /etc/nginx/mime.types;
        application/javascript mjs;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Cache static assets aggressively — Vite adds content hashes to filenames
    location ~* \.(js|mjs|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes → SPA entry point (React Router handles routing client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
