# nginx reverse proxy for Coolify deployments.
# Coolify/Traefik handles SSL termination upstream — this config is HTTP only.
# Frontend is served as static files by nginx:alpine (port 80, not 3000).

worker_processes 1;

events { worker_connections 512; }

http {
    sendfile on;
    client_max_body_size 50m;

    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        server backend:3001;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass         http://frontend;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        }

        location /api {
            proxy_pass         http://backend;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Split PDF runs OCR + Gemini and can take several minutes
        location ~* ^/api/companies/[^/]+/documents/split-pdf {
            proxy_pass         http://backend;
            proxy_redirect     off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
}
